<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>earnl</title>
    <!-- Load the special Gradio script that handles the connection -->
    <script type="module" src="https://gradio.s3-us-west-2.amazonaws.com/4.12.0/gradio.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #050505;
            color: #00ff9d;
            font-family: sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 15px;
            background: #111;
            border-bottom: 2px solid #00ff9d;
            text-align: center;
            font-weight: bold;
            letter-spacing: 2px;
        }
        /* This container holds the AI */
        .ai-container {
            flex-grow: 1;
            overflow-y: auto;
            background: #000;
        }
        gradio-app {
            background: transparent !important;
        }
    </style>
</head>
<body>

    <div class="header">
        SYSTEM ACCESS: PHI-3 TERMINAL
    </div>

    <div class="ai-container">
        <!-- We use the custom tag instead of <iframe> -->
        <gradio-app src="https://microsoft-phi-3-mini-4k-instruct.hf.space"></gradio-app>
    </div>

</body>
</html>
