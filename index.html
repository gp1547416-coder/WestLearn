<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bmw</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; overflow: hidden; }
        .header { height: 60px; background: #0078d4; display: flex; align-items: center; padding: 0 20px; color: white; }
        input { padding: 8px; border-radius: 4px; border: none; width: 250px; }
        button { padding: 8px 15px; margin-left: 10px; cursor: pointer; border: none; background: #005a9e; color: white; border-radius: 4px; }
        iframe { width: 100%; height: calc(100% - 60px); border: none; }
    </style>
</head>
<body>
    <div class="header">
        <strong>Bing Viewer</strong>&nbsp;&nbsp;
        <input type="text" id="query" placeholder="Search something...">
        <button onclick="search()">Search</button>
    </div>

    <!-- We start with a search for "Vercel" to see if it loads -->
    <iframe id="bingFrame" src="https://www.bing.com/search?q=vercel"></iframe>

    <script>
        function search() {
            const q = document.getElementById('query').value;
            if (q) {
                document.getElementById('bingFrame').src = `https://www.bing.com/search?q=${encodeURIComponent(q)}`;
            }
        }
    </script>
</body>
</html>
